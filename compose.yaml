services:
  db:
    image: postgres:17
    container_name: chat-postgres
    environment:
      POSTGRES_DB: messaging_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messaging_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
