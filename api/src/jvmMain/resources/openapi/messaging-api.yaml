openapi: 3.1.0
info:
  title: Messaging Collaboration API
  version: v1
  description: |
    Workspace and channel management is exposed as REST.
    Real-time chat is exposed over WebSocket at `/ws/channels/{channelId}`.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Service health
      responses:
        '200':
          description: Health response
  /api/v1/workspaces:
    post:
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
  /api/v1/workspaces/{workspaceId}:
    get:
      summary: Get a workspace
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
  /api/v1/workspaces/{workspaceId}/members:
    post:
      summary: Add a workspace member
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkspaceMemberRequest'
      responses:
        '201':
          description: Member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMemberResponse'
    get:
      summary: List workspace members
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceMemberResponse'
  /api/v1/workspaces/{workspaceId}/channels:
    post:
      summary: Create a channel
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
    get:
      summary: List workspace channels
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Channel list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelResponse'
  /api/v1/channels/{channelId}/messages:
    get:
      summary: List root channel messages
      parameters:
        - in: path
          name: channelId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: beforeMessageId
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePageResponse'
  /api/v1/messages/{messageId}/thread:
    get:
      summary: Get a thread
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thread details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadResponse'
  /api/v1/messages/{messageId}/reactions/toggle:
    post:
      summary: Toggle a message reaction
      parameters:
        - in: path
          name: messageId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleReactionRequest'
      responses:
        '200':
          description: Updated message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/link-preview/resolve:
    post:
      summary: Resolve an Open Graph link preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveLinkPreviewRequest'
      responses:
        '200':
          description: Resolved preview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveLinkPreviewResponse'
  /ws/channels/{channelId}:
    get:
      summary: WebSocket chat endpoint
      description: |
        Upgrade to WebSocket and exchange `ChatCommand` and `ChatEvent` JSON payloads.
        Supported command types are `LOAD_RECENT`, `POST_MESSAGE`, `REPLY_MESSAGE`, and `TOGGLE_REACTION`.
      parameters:
        - in: path
          name: channelId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: Switching Protocols
components:
  schemas:
    WorkspaceMemberRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER]
    ChannelVisibility:
      type: string
      enum: [PUBLIC, PRIVATE]
    CreateWorkspaceRequest:
      type: object
      required: [slug, name, ownerUserId, ownerDisplayName]
      properties:
        slug: { type: string }
        name: { type: string }
        ownerUserId: { type: string }
        ownerDisplayName: { type: string }
    WorkspaceResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        ownerMemberId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    AddWorkspaceMemberRequest:
      type: object
      required: [userId, displayName]
      properties:
        userId: { type: string }
        displayName: { type: string }
        role:
          $ref: '#/components/schemas/WorkspaceMemberRole'
    WorkspaceMemberResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        userId: { type: string }
        displayName: { type: string }
        role:
          $ref: '#/components/schemas/WorkspaceMemberRole'
        joinedAt: { type: string, format: date-time }
    CreateChannelRequest:
      type: object
      required: [slug, name, createdByMemberId]
      properties:
        slug: { type: string }
        name: { type: string }
        topic: { type: string, nullable: true }
        visibility:
          $ref: '#/components/schemas/ChannelVisibility'
        createdByMemberId: { type: string, format: uuid }
    ChannelResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        topic: { type: string, nullable: true }
        visibility:
          $ref: '#/components/schemas/ChannelVisibility'
        createdByMemberId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    PostMessageRequest:
      type: object
      required: [authorMemberId, body]
      properties:
        authorMemberId: { type: string, format: uuid }
        body: { type: string }
        linkPreview:
          $ref: '#/components/schemas/LinkPreviewResponse'
    ResolveLinkPreviewRequest:
      type: object
      required: [url]
      properties:
        url: { type: string }
    ResolveLinkPreviewResponse:
      type: object
      properties:
        preview:
          $ref: '#/components/schemas/LinkPreviewResponse'
    LinkPreviewResponse:
      type: object
      properties:
        url: { type: string }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        siteName: { type: string, nullable: true }
    ToggleReactionRequest:
      type: object
      required: [memberId, emoji]
      properties:
        memberId: { type: string, format: uuid }
        emoji: { type: string }
    MessageReactionResponse:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        memberIds:
          type: array
          items:
            type: string
            format: uuid
    MessageResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        channelId: { type: string, format: uuid }
        authorMemberId: { type: string, format: uuid }
        authorDisplayName: { type: string }
        body: { type: string }
        linkPreview:
          $ref: '#/components/schemas/LinkPreviewResponse'
        threadRootMessageId: { type: string, format: uuid, nullable: true }
        threadReplyCount: { type: integer }
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/MessageReactionResponse'
        createdAt: { type: string, format: date-time }
    MessagePageResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageResponse'
    ThreadResponse:
      type: object
      properties:
        root:
          $ref: '#/components/schemas/MessageResponse'
        replies:
          type: array
          items:
            $ref: '#/components/schemas/MessageResponse'
    ChatCommandType:
      type: string
      enum: [LOAD_RECENT, POST_MESSAGE, REPLY_MESSAGE, TOGGLE_REACTION]
    ChatCommand:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/ChatCommandType'
        authorMemberId: { type: string, format: uuid, nullable: true }
        body: { type: string, nullable: true }
        linkPreview:
          $ref: '#/components/schemas/LinkPreviewResponse'
        parentMessageId: { type: string, format: uuid, nullable: true }
        messageId: { type: string, format: uuid, nullable: true }
        emoji: { type: string, nullable: true }
        limit: { type: integer, nullable: true }
    ChatEventType:
      type: string
      enum: [SNAPSHOT, MESSAGE_POSTED, REPLY_POSTED, REACTION_UPDATED, ERROR]
    ChatEvent:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/ChatEventType'
        message:
          $ref: '#/components/schemas/MessageResponse'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageResponse'
        error:
          $ref: '#/components/schemas/ApiErrorResponse'
    ApiErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
